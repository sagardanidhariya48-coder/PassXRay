<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PassXray - Password Security Analyzer</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
    <h2>🔐 PassXray</h2>
    <p class="subtitle">Analyze & Generate Secure Passwords</p>

    <div class="input-box">
        <input type="password" id="password" placeholder="Enter password..." oninput="checkStrength()">
        <button onclick="togglePassword()">👁</button>
    </div>

    <div class="buttons">
        <button onclick="generatePassword()">Generate 🔑</button>
        <button onclick="copyPassword()">Copy 📋</button>
    </div>

    <div class="meter">
        <div id="bar"></div>
    </div>

    <p id="strength"></p>
    <p id="time"></p>

    <ul class="checklist">
        <li id="len">❌ At least 8 characters</li>
        <li id="upper">❌ Uppercase letter</li>
        <li id="lower">❌ Lowercase letter</li>
        <li id="num">❌ Number</li>
        <li id="special">❌ Special character</li>
    </ul>
</div>

<script src="script.js"></script>
</body>
</html>
